<style>
  :root {
    /* dark base — stronger hierarchy (high-contrast for low-quality monitors) */
    --bg: oklch(0.08 0.008 260);           /* deepest canvas — darker */
    --bg-2: oklch(0.12 0.009 260);         /* sidebar/panels */
    --bg-3: oklch(0.16 0.010 260);         /* nested sections in panels */
    --surface: oklch(0.235 0.013 260);     /* cards — lifted for clear separation */
    --surface-hover: oklch(0.28 0.015 260);
    --ink-1: oklch(0.97 0.005 260);
    --ink-2: oklch(0.74 0.010 260);
    --ink-3: oklch(0.54 0.012 260);
    --line: oklch(0.32 0.013 260);
    --line-strong: oklch(0.42 0.015 260);
    --panel-border: oklch(0.28 0.012 260); /* panel separation — visible divider */

    /* agent palette — vivid for dark mode */
    --t1: oklch(0.70 0.22 250); /* blue */
    --t1-bg: oklch(0.23 0.08 250);
    --t1-line: oklch(0.40 0.16 250);
    --t2: oklch(0.70 0.22 295); /* purple */
    --t2-bg: oklch(0.23 0.08 295);
    --t2-line: oklch(0.40 0.16 295);
    --t3: oklch(0.72 0.20 155); /* green */
    --t3-bg: oklch(0.23 0.07 155);
    --t3-line: oklch(0.40 0.14 155);
    --t4: oklch(0.72 0.20 50);  /* orange */
    --t4-bg: oklch(0.23 0.08 50);
    --t4-line: oklch(0.40 0.16 50);

    --ok: oklch(0.72 0.20 155);
    --warn: oklch(0.75 0.22 55);
  }
  html, body { background: var(--bg); color: var(--ink-1); font-family: 'Pretendard Variable', Pretendard, -apple-system, BlinkMacSystemFont, sans-serif; -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; }
  .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; letter-spacing: -0.01em; }
  .surface { background: var(--surface); }
  .surface-2 { background: var(--bg-2); }
  .bg-3 { background: var(--bg-3); }
  .ink-1 { color: var(--ink-1); }
  .ink-2 { color: var(--ink-2); }
  .ink-3 { color: var(--ink-3); }
  .line { border-color: var(--line); }
  .line-strong { border-color: var(--line-strong); }
  .panel-border { border-color: var(--panel-border); }

  /* utility for agent colored tokens */
  .t1-c { color: var(--t1); } .t1-bg { background: var(--t1-bg); } .t1-bd { border-color: var(--t1-line); } .t1-fill { background: var(--t1); }
  .t2-c { color: var(--t2); } .t2-bg { background: var(--t2-bg); } .t2-bd { border-color: var(--t2-line); } .t2-fill { background: var(--t2); }
  .t3-c { color: var(--t3); } .t3-bg { background: var(--t3-bg); } .t3-bd { border-color: var(--t3-line); } .t3-fill { background: var(--t3); }
  .t4-c { color: var(--t4); } .t4-bg { background: var(--t4-bg); } .t4-bd { border-color: var(--t4-line); } .t4-fill { background: var(--t4); }

  /* sleek scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: oklch(0.3 0.012 260); border-radius: 8px; border: 2px solid var(--bg); }
  ::-webkit-scrollbar-track { background: transparent; }

  /* card */
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: 14px; box-shadow: 0 1px 0 oklch(0.28 0.012 260 / 0.4) inset, 0 2px 8px -4px oklch(0.02 0.005 260 / 0.6); }
  .card-flat { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 500; border: 1px solid var(--line); background: var(--surface); color: var(--ink-2); }
  .dot { width: 6px; height: 6px; border-radius: 999px; display: inline-block; }
  .kbd { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 1px 5px; border-radius: 4px; background: var(--surface-2); border: 1px solid var(--line); color: var(--ink-2); }

  /* toggle — simplified */
  .seg { display: inline-flex; background: var(--surface); border: 1px solid var(--line); border-radius: 6px; padding: 2px; gap: 1px; }
  .seg button { padding: 4px 10px; border-radius: 5px; font-size: 11px; font-weight: 500; color: var(--ink-3); transition: all .15s; }
  .seg button.on { background: var(--bg-2); color: var(--ink-1); border: 1px solid var(--line); }

  /* code/row sample */
  .code-row { display: flex; gap: 10px; align-items: flex-start; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--line); background: var(--surface); transition: all .15s; cursor: pointer; }
  .code-row:hover { border-color: var(--line-strong); }
  .code-row.sel { border-color: var(--t1); background: var(--t1-bg); }

  /* sidebar tier rail */
  .rail { width: 2px; background: var(--line); position: relative; }
  .rail-dot { width: 10px; height: 10px; border-radius: 999px; border: 2px solid var(--surface); position: absolute; left: -4px; }

  /* pulse */
  @keyframes pulse-soft { 0%,100% { opacity: 1 } 50% { opacity: .5 } }
  .pulse { animation: pulse-soft 1.6s ease-in-out infinite; }

  /* dashed visual */
  .dashed { background-image: linear-gradient(45deg, transparent 48%, var(--line-strong) 48% 52%, transparent 52%); background-size: 8px 8px; }

  /* IA tree connector */
  .tree-line { background: var(--line); }

  /* shadow */
  .lift { box-shadow: 0 1px 0 oklch(0.16 0.009 260), 0 8px 24px -8px oklch(0.1 0.01 260 / 0.5); }

  .ring-soft { box-shadow: 0 0 0 4px oklch(0.65 0.18 255 / 0.12); }

  .scroll-hide::-webkit-scrollbar { display: none; }
</style>

  Lightbulb: (p) => <I {...p}><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a6 6 0 0 0-4 10c1 1 2 2 2 4h4c0-2 1-3 2-4a6 6 0 0 0-4-10z"/></I>,
  Doc: (p) => <I {...p}><path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><path d="M14 3v6h6"/><path d="M8 13h8M8 17h6"/></I>,

  Eye: (p) => <I {...p}><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></I>,
  Filter: (p) => <I {...p}><path d="M3 5h18l-7 9v6l-4-2v-4z"/></I>,

// ========== src/intro.jsx ==========
// Intro / Onboarding screen — participant defines their project before entering T1
function IntroScreen({ onStart }) {
  const [name, setName] = React.useState('동네 카페 단골 관리 앱');
  const [goal, setGoal] = React.useState('소규모 동네 카페 사장님이 바쁜 카운터 상황에서도 단골 손님을 자동으로 식별하고 적립을 자동화해, 단골 관리에 별도 인지 자원을 쓰지 않고도 운영할 수 있는 서비스를 만들고 싶어요.');
  const [target, setTarget] = React.useState('1인 운영 동네 카페 사장님 (30~50대)');
  const [participantName, setParticipantName] = React.useState('');

  const canStart = name.trim().length > 0 && goal.trim().length > 0 && participantName.trim().length > 0;

  const startProject = () => {
    if (!canStart) return;
    onStart({ 
      name: name.trim(), 
      goal: goal.trim(), 
      target: target.trim(),
      participant: {
        name: participantName.trim(),
        timestamp: new Date().toISOString()
      }
    });
  };

  const fields = [
    {
      key: 'participantName',
      label: '참여자 이름',
      required: true,
      placeholder: '예: 홍길동',
      value: participantName,
      setValue: setParticipantName,
      type: 'input',
    },
    {
      key: 'name',
      label: '프로젝트 이름',
      required: true,
      placeholder: '예: 동네 카페 단골 관리 앱',
      value: name,
      setValue: setName,
      type: 'input',
    },
    {
      key: 'goal',
      label: '어떤 걸 만드세요?',
      required: true,
      placeholder: '예: 단골 손님을 자동으로 알아보고 적립까지 자동으로 해줘서, 사장님이 카운터에서 단골 관리에 신경 안 쓰셔도 되는 서비스를 만들고 싶어요.',
      value: goal,
      setValue: setGoal,
      type: 'textarea',
    },
    {
      key: 'target',
      label: '누가 쓸 거예요?',
      required: false,
      placeholder: '예: 1인 운영 동네 카페 사장님',
      value: target,
      setValue: setTarget,
      type: 'input',
    },
  ];

  return (
    <div className="h-screen overflow-y-auto" style={{ background: 'var(--bg)' }}>
      <div className="min-h-full flex items-center justify-center px-6 py-12">
        <div className="w-full" style={{ maxWidth: 580 }}>
          {/* Header */}
          <div className="flex flex-col items-center text-center mb-10">
            {/* 4-tier brand mark */}
            <div className="flex items-center gap-1.5 mb-7">
              <div className="w-2.5 h-2.5 rounded-full" style={{ background: 'var(--t1)' }}/>
              <div className="w-4 h-px" style={{ background: 'var(--line-strong)' }}/>
              <div className="w-2.5 h-2.5 rounded-full" style={{ background: 'var(--t2)' }}/>
              <div className="w-4 h-px" style={{ background: 'var(--line-strong)' }}/>
              <div className="w-2.5 h-2.5 rounded-full" style={{ background: 'var(--t3)' }}/>
              <div className="w-4 h-px" style={{ background: 'var(--line-strong)' }}/>
              <div className="w-2.5 h-2.5 rounded-full" style={{ background: 'var(--t4)' }}/>
            </div>
            <h1 className="text-[30px] font-semibold ink-1 leading-tight tracking-tight">
              안녕하세요.<br/>어떤 걸 만들어볼까요?
            </h1>
            <p className="text-[13.5px] ink-2 mt-4 leading-relaxed max-w-[460px]">
              AI랑 같이 처음부터 끝까지 진행해볼 거예요. 인터뷰 정리 → 문제 정하기 → 아이디어 펼치기 → 문서로 정리까지요. 시작 전에 어떤 걸 만들고 싶은지 알려주세요.
            </p>
          </div>

          {/* Form */}
          <div className="space-y-5">
            {fields.map(f => (
              <div key={f.key}>
                <label className="flex items-center gap-1.5 text-[11px] mono uppercase tracking-wider ink-3 mb-2">
                  <span>{f.label}</span>
                  {!f.required && <span className="normal-case lowercase ink-3" style={{ letterSpacing: 0 }}>(선택)</span>}
                </label>
                {f.type === 'textarea' ? (
                  <textarea
                    value={f.value}
                    onChange={e => f.setValue(e.target.value)}
                    placeholder={f.placeholder}
                    rows={4}
                    className="w-full px-4 py-3 rounded-lg text-[14px] ink-1 outline-none resize-none leading-relaxed transition-all"
                    style={{ background: 'var(--surface)', border: '1px solid var(--line)' }}
                    onFocus={e => { e.target.style.borderColor = 'var(--t1)'; e.target.style.boxShadow = '0 0 0 3px var(--t1-bg)'; }}
                    onBlur={e => { e.target.style.borderColor = 'var(--line)'; e.target.style.boxShadow = 'none'; }}
                  />
                ) : (
                  <input
                    type="text"
                    value={f.value}
                    onChange={e => f.setValue(e.target.value)}
                    placeholder={f.placeholder}
                    className="w-full px-4 py-3 rounded-lg text-[14px] ink-1 outline-none transition-all"
                    style={{ background: 'var(--surface)', border: '1px solid var(--line)' }}
                    onFocus={e => { e.target.style.borderColor = 'var(--t1)'; e.target.style.boxShadow = '0 0 0 3px var(--t1-bg)'; }}
                    onBlur={e => { e.target.style.borderColor = 'var(--line)'; e.target.style.boxShadow = 'none'; }}
                    onKeyDown={e => { if (e.key === 'Enter' && f.key === 'name') document.querySelector('textarea')?.focus(); }}
                  />
                )}
              </div>
            ))}
          </div>

          {/* Start button */}
          <button
            onClick={startProject}
            disabled={!canStart}
            className="w-full mt-8 py-3.5 rounded-lg text-[14px] font-semibold flex items-center justify-center gap-2 transition-all"
            style={{
              background: canStart ? 'var(--t1)' : 'var(--surface)',
              color: canStart ? 'white' : 'var(--ink-3)',
              border: `1px solid ${canStart ? 'var(--t1)' : 'var(--line)'}`,
              cursor: canStart ? 'pointer' : 'not-allowed',
            }}>
            시작하기
            <Icon.Arrow s={15} c={canStart ? 'white' : 'var(--ink-3)'} sw={2}/>
          </button>

          {/* Footer */}
          <div className="mt-6 flex flex-wrap items-center justify-center gap-3 text-[11px] ink-3">

  const [selected, setSelected] = React.useState(new Set());
  const [showPopup, setShowPopup] = React.useState(false);
  const [hovered, setHovered] = React.useState(true);
  const [frictionCountdown, setFrictionCountdown] = React.useState(5);
  const [aiOpened, setAiOpened] = React.useState(false);
  const [aiLoading, setAiLoading] = React.useState(false);
  const [aiResult, setAiResult] = React.useState(null);
  const [aiError, setAiError] = React.useState(null);
  const [showHandoff, setShowHandoff] = React.useState(false);
  // Upload simulation
  const [uploading, setUploading] = React.useState(false);
  const [uploadProgress, setUploadProgress] = React.useState(0);

  const startUpload = () => {
    setUploading(true);
    setUploadProgress(0);
    const interval = setInterval(() => {
      setUploadProgress(p => {
        const next = p + 3 + Math.random() * 7;
        if (next >= 100) {
          clearInterval(interval);
          setTimeout(() => {
            setState(s => ({ ...s, t1: { ...s.t1, uploaded: true } }));
            setUploading(false);
          }, 500);
          return 100;
        }
        return next;
      });
    }, 70);
  };

  // Condition B: friction-detect simulation
  React.useEffect(() => {
    if (condition !== 'B') return;
    if (aiOpened) return;
    setFrictionCountdown(5);
    const t = setInterval(() => {
      setFrictionCountdown(s => {
        if (s <= 1) { clearInterval(t); setAiOpened(true); return 0; }
        return s - 1;
      });
    }, 1000);
    return () => clearInterval(t);
  }, [condition, aiOpened]);

  React.useEffect(() => { setAiOpened(false); setShowPopup(false); setSelected(new Set()); }, [condition]);

  const toggle = (id) => {
    setSelected(s => {
      const n = new Set(s);
      n.has(id) ? n.delete(id) : n.add(id);
      return n;
    });
  };

      const prompt = `당신은 UX 리서치 분석 보조 AI입니다. 한국 동네 카페 사장님 인터뷰에서 추출한 원시 코드(verbatim quote)를 분석합니다.\n\n[${sourceLabel}]\n${codeList}\n\n위 코드들을 의미 패턴에 따라 2~3개 군집으로 묶고, 각 군집의 이름·요약·신뢰도를 도출하세요. 반드시 다음 JSON 형식만 출력하세요(다른 텍스트 금지):\n\n{\n  "headline": "한 줄 요약(20자 이내, 발견한 패턴 수 포함)",\n  "clusters": [\n    { "label": "군집명(15자 이내)", "summary": "한 문장 요약(35자 이내)", "codeIds": ["C-014", ...], "confidence": 78 }\n  ]\n}`;
      const text = await window.aiComplete(prompt);

function pickIntentSeeds(problem, seedMap) {
  const map = seedMap || INTENT_SEED_MAP;
  if (!problem) return map.default;
  if (/도장|쿠폰|적립.*손|찍/.test(problem)) return map['도장'];
  if (/개인정보|전화번호|익명|노출/.test(problem)) return map['개인정보'];
  if (/단골|알아|식별|기억/.test(problem)) return map['단골'];
  return map.default;
}

function buildIaAndPrdFromT3(state, t4Content) {
  const mode = state?.t3?.mode;
  const concepts = [];
  if (mode === 'A' && Array.isArray(state.t3?.selectedDirections)) {
    state.t3.selectedDirections.forEach(d => concepts.push({ title: d.keyword, desc: d.desc, evidence: d.evidence || [] }));
  }
  if (mode === 'B' && state.t3?.adoptedSolution) {
    const s = state.t3.adoptedSolution;
    concepts.push({ title: s.title, desc: (s.rationale || []).join(' · '), evidence: s.evidence || [] });
  }

  // Build IA: start from base, add screens matching the chosen concepts
  const _baseIa = (t4Content && t4Content.baseIa) || BASE_IA;
  const _iaLib = ((t4Content && t4Content.conceptIaLibrary) || CONCEPT_IA_LIBRARY).map(item =>
    item.matchPattern ? { ...item, match: new RegExp(item.matchPattern) } : item
  );
  const _prdLib = ((t4Content && t4Content.conceptPrdLibrary) || CONCEPT_PRD_LIBRARY).map(item =>
    item.matchPattern ? { ...item, match: new RegExp(item.matchPattern) } : item
  );
  const _missingLib = (t4Content && t4Content.missingLibrary) || MISSING_LIBRARY;
  const ia = _baseIa.map(n => ({ ...n, children: [...n.children] }));
  const seen = new Set();
  concepts.forEach(c => {
    const blob = `${c.title} ${c.desc}`;
    _iaLib.forEach(({ match, screen, under }) => {
      if (match.test(blob) && !seen.has(screen)) {
        const node = ia.find(n => n.id === under);
        if (node) {
          node.children.push(screen);
          seen.add(screen);
        }
      }
    });
  });

  // Build PRD
  const goal = state.t2?.problem || state.t2?.hmw || '단골 관리의 인지 부담을 줄이고 적립을 자연스럽게 잇는다.';
  const featureLines = [];
  const featureSeen = new Set();
  concepts.forEach(c => {
    const blob = `${c.title} ${c.desc}`;
    _prdLib.forEach(({ match, line }) => {
      if (match.test(blob) && !featureSeen.has(line)) {
        featureLines.push(line);
        featureSeen.add(line);
      }
    });
  });
  if (featureLines.length === 0) {
    featureLines.push('- 단골 자동 식별 + 적립 자동화 흐름');
  }

  const prd = `## 1. 목표\n${goal}\n\n## 2. 핵심 기능\n${featureLines.join('\n')}\n\n## 3. 비기능 요구사항\n- 데이터는 로컬에서 우선 처리\n- 손님 추가 행동 최소화`;

  // Build missing items: only those whose cluster is present in chosen concepts
  // (heuristic — match by evidence code IDs)
  const codeIdPool = new Set();
  concepts.forEach(c => (c.evidence || []).forEach(id => codeIdPool.add(id)));
  const hasStampLoss = ['C-014','C-027','C-052','C-079'].some(id => codeIdPool.has(id));
  const hasIdentify  = ['C-021','C-038','C-058','C-071','C-088'].some(id => codeIdPool.has(id));
  const hasPrivacy   = ['C-031','C-044','C-063'].some(id => codeIdPool.has(id));
  const presence = { 'stamp-loss': hasStampLoss, identify: hasIdentify, privacy: hasPrivacy };

  const missing = _missingLib
    .filter(m => presence[m.cluster] || concepts.length === 0)
    .slice(0, 3);

  return { ia, prd, missing, concepts };
}

            <div className="px-6 py-4" style={{ background: 'var(--bg-3)', borderBottom: '1px solid var(--line)' }}>
              <div className="flex items-center gap-2 text-[11px] mono t4-c mb-1">
                <Icon.Sparkle s={12} c="var(--t4)" /> AI가 고친다고 해요

              <h3 className="text-[18px] font-semibold ink-1">{pendingFix.label}</h3>

            <div className="px-6 py-5">

                <div className="text-[10.5px] mono uppercase tracking-wider ink-3 mb-2">바뀔 내용 미리보기</div>
                <div className="text-[13px] ink-1 leading-relaxed">{pendingFix.fix}</div>
                <div className="mt-4 pt-4 flex items-center gap-2 text-[11.5px] ink-3" style={{ borderTop: '1px solid var(--line)' }}>
                  <Icon.Link s={12} c="var(--ink-3)" />
                  <span>관련 인터뷰: "{CLUSTERS[pendingFix.cluster].label}" ({CLUSTERS[pendingFix.cluster].count}번 언급)</span>
                </div>
              </div>
            </div>
            <div className="px-6 py-4 flex items-center justify-between" style={{ background: 'var(--bg-3)', borderTop: '1px solid var(--line)' }}>
              <div className="text-[11.5px] ink-3">바뀐 내용은 따로 기록돼요</div>
              <div className="flex gap-2">
                <button onClick={() => setPendingFix(null)} className="text-[13px] px-4 py-2 rounded-lg surface border line ink-2 font-medium flex items-center gap-1.5">
                  <Icon.Block s={13} c="var(--ink-2)" /> 안 할래요
                </button>
                <button onClick={() => applyFix(pendingFix)} className="text-[13px] font-semibold px-4 py-2 rounded-lg text-white flex items-center gap-1.5" style={{ background: 'var(--t4)' }}>
                  <Icon.Approve s={13} c="white" /> 좋아요, 고쳐주세요
                </button>
              </div>
            </div>
          </div>
        </div>
      }
    </div>
  );
}

// ========== src/summary.jsx ==========
// Summary & Export — Final review of all choices made across T1-T4, with download capability

function SummaryView({ state, onClose }) {
  const [exporting, setExporting] = React.useState(false);
  const [exportProgress, setExportProgress] = React.useState(0);

  // Gather all decisions from state
  const t1Insights = state.t1?.savedResult?.clusters || [];
  const t2Problem = state.t2?.problem || state.t2?.hmw || '';
  const t2Feedback = state.t2?.savedFeedback || '';
  const t2AltProblem = state.t2?.savedAltProblem || '';
  
  const t3Mode = state.t3?.mode;
  const t3Intent = state.t3?.intent || '';
  const t3Directions = state.t3?.selectedDirections || [];
  const t3Solution = state.t3?.adoptedSolution;

  const conditions = state.conditions || {};

  const exportResults = async () => {
    setExporting(true);
    setExportProgress(0);

    // Simulate export process
    const steps = [
      { label: 'T1 인사이트 정리 중', duration: 400 },
      { label: 'T2 문제 정의 저장 중', duration: 300 },
      { label: 'T3 아이디어 묶는 중', duration: 500 },
      { label: 'T4 문서 생성 중', duration: 600 },
      { label: 'JSON 파일 만드는 중', duration: 400 },
    ];

    for (let i = 0; i < steps.length; i++) {
      await new Promise(resolve => setTimeout(resolve, steps[i].duration));
      setExportProgress(((i + 1) / steps.length) * 100);
    }

    // Build export data
    const exportData = {
      timestamp: new Date().toISOString(),
      participant: state.project?.participant || {},
      project: {
        name: state.project?.name,
        goal: state.project?.goal,
      },
      conditions: {
        T1: conditions.T1,
        T2: conditions.T2,
        T3: conditions.T3,
        T4: conditions.T4,
      },
      results: {
        T1_research: {
          condition: conditions.T1,
          clusters: t1Insights,
          locked: state.t1?.insightsLocked || false,
        },
        T2_problem: {
          condition: conditions.T2,
          problem: t2Problem,
          aiFeedback: t2Feedback,
          alternativeProblem: t2AltProblem,
          locked: state.t2?.problemLocked || false,
        },
        T3_ideation: {
          condition: conditions.T3,
          mode: t3Mode,
          intent: t3Intent,
          selectedDirections: t3Directions,
          adoptedSolution: t3Solution,
          conceptCount: state.t3?.conceptCount || 0,
          locked: state.t3?.conceptsLocked || false,
        },
        T4_documentation: {
          condition: conditions.T4,
          completed: true,
        },
      },
    };

    // Trigger download
    const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const participantName = state.project?.participant?.name || 'participant';
    const safeParticipantName = participantName.replace(/[^a-zA-Z0-9가-힣]/g, '_');
    a.download = `ux-studio-${safeParticipantName}-${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    await new Promise(resolve => setTimeout(resolve, 300));
    setExporting(false);
    setExportProgress(0);
  };

  const exportCSV = () => {
    // Build CSV data
    const rows = [];
    
    // Header
    rows.push(['항목', '내용']);
    rows.push(['']);
    
    // Participant info
    rows.push(['=== 참여자 정보 ===', '']);
    rows.push(['참여자 이름', state.project?.participant?.name || '']);
    rows.push(['참여 시간', state.project?.participant?.timestamp ? new Date(state.project.participant.timestamp).toLocaleString('ko-KR') : '']);
    rows.push(['프로젝트 이름', state.project?.name || '']);
    rows.push(['프로젝트 목표', state.project?.goal || '']);
    rows.push(['']);
    
    // Conditions
    rows.push(['=== 시나리오 조건 ===', '']);
    rows.push(['T1 시나리오', conditions.T1]);
    rows.push(['T2 시나리오', conditions.T2]);
    rows.push(['T3 시나리오', conditions.T3]);
    rows.push(['T4 시나리오', conditions.T4]);
    rows.push(['']);
    
    // T1 Results
    rows.push(['=== T1 리서치 해석 ===', '']);
    rows.push(['선택한 클러스터 수', t1Insights.length]);
    t1Insights.forEach((cluster, i) => {
      rows.push([`클러스터 ${i + 1}`, cluster.label || '']);
      if (cluster.insights) {
        cluster.insights.forEach((insight, j) => {
          rows.push([`  인사이트 ${i + 1}-${j + 1}`, insight]);
        });
      }
    });
    rows.push(['']);
    
    // T2 Results
    rows.push(['=== T2 문제 정의 ===', '']);
    rows.push(['문제 정의', t2Problem]);
    if (t2Feedback) rows.push(['AI 피드백', t2Feedback]);
    if (t2AltProblem) rows.push(['대안 문제', t2AltProblem]);
    rows.push(['']);
    
    // T3 Results
    rows.push(['=== T3 아이데이션 ===', '']);
    rows.push(['모드', t3Mode === 'A' ? '텍스트 리스트' : '시각적 카드']);
    rows.push(['의도', t3Intent]);
    rows.push(['선택한 아이디어 수', state.t3?.conceptCount || 0]);
    if (t3Directions && t3Directions.length > 0) {
      t3Directions.forEach((dir, i) => {
        rows.push([`아이디어 ${i + 1}`, dir.keyword || dir.title || '']);
      });
    }
    if (t3Solution) {
      rows.push(['채택한 솔루션', t3Solution.title || '']);
    }
    rows.push(['']);
    
    // T4 Results
    rows.push(['=== T4 문서화 ===', '']);
    rows.push(['완료 여부', '완료']);
    
    // Convert to CSV
    const csvContent = rows.map(row => 
      row.map(cell => {
        const cellStr = String(cell || '');
        if (cellStr.includes(',') || cellStr.includes('\n') || cellStr.includes('"')) {
          return '"' + cellStr.replace(/"/g, '""') + '"';
        }
        return cellStr;
      }).join(',')
    ).join('\n');
    
    // Add BOM for Excel UTF-8 support
    const BOM = '\uFEFF';
    const blob = new Blob([BOM + csvContent], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const participantName = state.project?.participant?.name || 'participant';
    const safeParticipantName = participantName.replace(/[^a-zA-Z0-9가-힣]/g, '_');
    a.download = `ux-studio-${safeParticipantName}-${new Date().toISOString().slice(0, 10)}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  };

  return (
    <div className="fixed inset-0 z-50 flex items-center justify-center" style={{ background: 'oklch(0.08 0.01 260 / 0.92)' }} onClick={onClose}>
      <div className="w-[880px] max-h-[90vh] rounded-2xl overflow-hidden lift flex flex-col" style={{ background: 'var(--bg-2)', border: '1px solid var(--panel-border)' }} onClick={e => e.stopPropagation()}>
        
        {/* Header */}
        <div className="px-6 py-5 flex items-start justify-between shrink-0" style={{ background: 'var(--bg-3)', borderBottom: '1px solid var(--line)' }}>
          <div>
            <div className="flex items-center gap-2 text-[11px] mono ink-3 mb-1.5">
              <Icon.Check s={12} c="var(--ok)" sw={2.4} />
              전체 결과 요약
            </div>
            <h2 className="text-[22px] font-semibold ink-1">선택한 내용을 확인하고 다운로드하세요</h2>
            <p className="text-[12.5px] ink-2 mt-1.5 leading-relaxed">
              T1부터 T4까지 선택하고 작성한 모든 내용이 정리돼 있어요.
            </p>
          </div>
          <div className="flex items-center gap-2">
            <button onClick={exportCSV} className="text-[12.5px] px-3 py-2 rounded-lg surface border line ink-2 font-medium flex items-center gap-2 hover:border-line-strong transition-all">
              <Icon.Download s={13} c="var(--ink-2)" />
              CSV 다운로드
            </button>
            <button onClick={exportResults} className="text-[12.5px] px-3 py-2 rounded-lg surface border line ink-2 font-medium flex items-center gap-2 hover:border-line-strong transition-all">
              <Icon.Download s={13} c="var(--ink-2)" />
              JSON 다운로드
            </button>
            <button onClick={onClose} className="ink-3 hover:ink-1 mt-1">
              <Icon.X s={20} />
            </button>
          </div>
        </div>

        {/* Content — scrollable */}
        <div className="flex-1 overflow-y-auto px-6 py-5">
          
          {/* Participant & Project info */}
          <div className="grid grid-cols-2 gap-3 mb-4">
            {state.project?.participant?.name && (
              <div className="card p-4">
                <div className="text-[10.5px] mono uppercase tracking-wider ink-3 mb-2">참여자</div>
                <div className="text-[14px] font-semibold ink-1">{state.project.participant.name}</div>
                {state.project.participant.timestamp && (
                  <div className="text-[10px] ink-3 mt-1 mono">
                    {new Date(state.project.participant.timestamp).toLocaleString('ko-KR')}
                  </div>
                )}
              </div>
            )}
            {state.project?.name && (
              <div className="card p-4">
                <div className="text-[10.5px] mono uppercase tracking-wider ink-3 mb-2">프로젝트</div>
                <div className="text-[14px] font-semibold ink-1">{state.project.name}</div>
                {state.project.goal && (
                  <div className="text-[12px] ink-2 mt-1">{state.project.goal}</div>
                )}
              </div>
            )}
          </div>

          {/* T1 Results */}
          <div className="mb-5">
            <div className="flex items-center gap-2 mb-3">
              <div className="w-6 h-6 rounded flex items-center justify-center text-[11px] mono font-semibold t1-fill text-white">T1</div>
              <h3 className="text-[15px] font-semibold ink-1">리서치 해석</h3>
              <span className="chip text-[10px]">시나리오 {conditions.T1}</span>
            </div>
            
            {t1Insights.length > 0 ? (
              <div className="space-y-2">
                {t1Insights.map((cluster, idx) => {
                  const palette = ['#3b82f6', '#8b5cf6', '#f59e0b', '#10b981'];
                  const color = palette[idx % palette.length];
                  return (
                    <div key={idx} className="flex items-start gap-3 p-3.5 rounded-lg surface border line">
                      <div className="w-1.5 self-stretch rounded-full shrink-0" style={{ background: color, minHeight: 40 }} />
                      <div className="flex-1">
                        <div className="flex items-center justify-between">
                          <div className="text-[13px] font-semibold ink-1">{cluster.label}</div>
                          <div className="text-[10.5px] mono ink-3">{cluster.confidence}%</div>
                        </div>
                        <div className="text-[11.5px] ink-2 mt-1 leading-snug">{cluster.summary}</div>
                        {cluster.codeIds && cluster.codeIds.length > 0 && (
                          <div className="mt-2 flex flex-wrap gap-1">
                            {cluster.codeIds.map(id => (
                              <span key={id} className="text-[10px] mono px-1.5 py-0.5 rounded-md surface-2 border line ink-3">{id}</span>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  );
                })}
              </div>
            ) : (
              <div className="card p-4 dashed text-center">
                <div className="text-[11.5px] ink-3">아직 인사이트가 정리되지 않았어요</div>
              </div>
            )}
          </div>

          {/* T2 Results */}
          <div className="mb-5">
            <div className="flex items-center gap-2 mb-3">
              <div className="w-6 h-6 rounded flex items-center justify-center text-[11px] mono font-semibold t2-fill text-white">T2</div>
              <h3 className="text-[15px] font-semibold ink-1">문제 정의</h3>
              <span className="chip text-[10px]">시나리오 {conditions.T2}</span>
            </div>
            
            {t2Problem ? (
              <div className="space-y-2">
                <div className="card p-4">
                  <div className="text-[10.5px] mono uppercase tracking-wider ink-3 mb-2">정한 문제</div>
                  <div className="text-[14px] font-medium ink-1 leading-snug">{t2Problem}</div>
                </div>
                
                {t2Feedback && (
                  <div className="p-3.5 rounded-lg" style={{ background: 'var(--t2-bg)', border: '1px solid var(--t2-line)' }}>
                    <div className="text-[10.5px] mono t2-c uppercase tracking-wider mb-1.5">AI 피드백</div>
                    <div className="text-[12px] ink-1 leading-snug">{t2Feedback}</div>
                  </div>
                )}
                
                {t2AltProblem && (
                  <div className="p-3.5 rounded-lg surface-2 border line">
                    <div className="text-[10.5px] mono ink-3 uppercase tracking-wider mb-1.5">AI 제안 (대안)</div>
                    <div className="text-[12px] ink-2 leading-snug">{t2AltProblem}</div>
                  </div>
                )}
              </div>
            ) : (
              <div className="card p-4 dashed text-center">
                <div className="text-[11.5px] ink-3">아직 문제가 정의되지 않았어요</div>
              </div>
            )}
          </div>

          {/* T3 Results */}
          <div className="mb-5">
            <div className="flex items-center gap-2 mb-3">
              <div className="w-6 h-6 rounded flex items-center justify-center text-[11px] mono font-semibold t3-fill text-white">T3</div>
              <h3 className="text-[15px] font-semibold ink-1">아이디어 펼치기</h3>
              <span className="chip text-[10px]">시나리오 {conditions.T3}</span>
            </div>
            
            {t3Intent && (
              <div className="card p-4 mb-2">
                <div className="text-[10.5px] mono uppercase tracking-wider ink-3 mb-2">내 생각 (의도)</div>
                <div className="text-[12.5px] ink-1 leading-snug">{t3Intent}</div>
              </div>
            )}
            
            {t3Mode === 'A' && t3Directions.length > 0 && (
              <div className="space-y-2">
                <div className="text-[11px] mono ink-3 uppercase tracking-wider mb-1">고른 방향 ({t3Directions.length}개)</div>
                {t3Directions.map((dir, idx) => (
                  <div key={idx} className="flex items-start gap-3 p-3.5 rounded-lg surface border line">
                    <div className="w-7 h-7 rounded-lg flex items-center justify-center shrink-0 t3-bg border t3-bd">
                      <span className="text-[11px] mono font-bold t3-c">{idx + 1}</span>
                    </div>
                    <div className="flex-1">
                      <div className="text-[13px] font-semibold ink-1">{dir.keyword}</div>
                      <div className="text-[11.5px] ink-2 mt-1 leading-snug">{dir.desc}</div>
                      {dir.evidence && dir.evidence.length > 0 && (
                        <div className="mt-2 flex flex-wrap gap-1">
                          {dir.evidence.map(e => (
                            <span key={e} className="text-[10px] mono px-1.5 py-0.5 rounded-md surface-2 border line ink-3">{e}</span>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                ))}
              </div>

            {t3Mode === 'B' && t3Solution && (

                        <span>{r}</span>
                      </li>
                    ))}
                  </ul>

            {!t3Intent && !t3Directions.length && !t3Solution && (
              <div className="card p-4 dashed text-center">
                <div className="text-[11.5px] ink-3">아직 아이디어가 정리되지 않았어요</div>

        {/* Export progress overlay */}
        {exporting && (

            <div className="flex items-center justify-between mb-2">

              <span className="text-[12px] mono ink-1">{Math.round(exportProgress)}%</span>
            </div>
            <div className="h-2 rounded-full overflow-hidden" style={{ background: 'var(--bg-3)' }}>
              <div className="h-full transition-all" style={{ width: `${exportProgress}%`, background: 'var(--ok)' }} />
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// Main app — top bar, T1-T4 tabs, condition toggle, central workspace router.
const { useState } = React;

const TAB_DEFS = [
{ id: 'T1', label: '리서치 해석', color: 't1', component: 'Task1', sub: '개입 트리거 A/B' },
{ id: 'T2', label: '문제 정의', color: 't2', component: 'Task2', sub: '설명 방식 A/B' },
{ id: 'T3', label: '아이데이션', color: 't3', component: 'Task3', sub: '시각화 방식 A/B' },
{ id: 'T4', label: '문서화', color: 't4', component: 'Task4', sub: '수정 주도권 A/B' }];


function ConditionToggle({ value, onChange, color, labelA, labelB }) {
  return (
    <div className="seg">
      <button onClick={() => onChange('A')} className={value === 'A' ? 'on' : ''} title={labelA}>

}

const COND_LABELS = {
  T1: { A: '사용자 주도형 · 명시적 호출', B: '마찰 감지형 · 선제 개입' },
  T2: { A: '결론 중심형', B: '비판적 검증 · 데빌스 에드버킷' },

function TopBar({ active, setActive, conditions, setConditions }) {
  const tabColor = active.color;
  return (
    <header className="border-b panel-border" style={{ background: 'var(--bg-2)', borderColor: 'var(--panel-border)' }}>
      {/* Row 1 — simplified chrome */}
      <div className="px-6 h-11 flex items-center justify-between">

function App() {
  const [active, setActive] = useState(TAB_DEFS[0]);
  const [conditions, setConditions] = useState({ T1: 'B', T2: 'B', T3: 'B', T4: 'B' });
  const [showSummary, setShowSummary] = useState(false);
  const [cluxContent, setCluxContent] = useState(null);
  const [state, setState] = useState({
    projectStarted: false,
    project: { name: '', goal: '', target: '' },
    progress: 0.06,
    conditions: { T1: 'B', T2: 'B', T3: 'B', T4: 'B' },
    t1: { insightsLocked: false },
    t2: { hmw: '어떻게 하면 사장님이 바쁜 와중에도 단골을 바로 알아볼 수 있을까?', hmwLocked: false },
    t3: { conceptCount: 0 }
  });

  // Load content from JSON
  React.useEffect(() => {
    fetch('https://raw.githubusercontent.com/ilujh0507/sisu-t1/main/clux-content.json')
      .then(r => r.json())
      .then(data => { window.__cluxContent = data; setCluxContent(data); })
      .catch(e => console.warn('clux-content.json 로드 실패, 기본 데이터 사용:', e));
  }, []);

  // Listen for summary event from T4
  React.useEffect(() => {
    const handler = () => setShowSummary(true);
    window.addEventListener('show-summary', handler);
    return () => window.removeEventListener('show-summary', handler);
  }, []);

  // keep state.conditions in sync with conditions
  React.useEffect(() => {setState((s) => ({ ...s, conditions }));}, [conditions]);

  // Load state from localStorage on mount - check for existing participant data
  React.useEffect(() => {
    const participantsKey = 'ux_studio_participants';
    const participantsList = JSON.parse(localStorage.getItem(participantsKey) || '[]');
    
    // Don't auto-load - always start fresh
    // Users can load existing participants from the intro screen
  }, []);

  // Save state to localStorage whenever it changes - per participant
  React.useEffect(() => {
    if (state.project?.participant?.name) {
      const participantName = state.project.participant.name;
      const stateKey = `ux_studio_state_${participantName}`;
      localStorage.setItem(stateKey, JSON.stringify(state));
      
      const participantsKey = 'ux_studio_participants';
      const participantsList = JSON.parse(localStorage.getItem(participantsKey) || '[]');
      if (!participantsList.includes(participantName)) {
        participantsList.push(participantName);
        localStorage.setItem(participantsKey, JSON.stringify(participantsList));
      }
    }
  }, [state]);

  const Comp = window[active.component];

  const handleSetActive = React.useCallback((tab) => {
    const num = tab.id.replace('T', '');
    window.parent.postMessage({ type: 'CLUX_TASK_CHANGE', taskId: 'Task' + num, taskLabel: 'Task ' + num }, '*');
    setActive(tab);
  }, []);

  const goToTab = (id) => {
    const next = TAB_DEFS.find((t) => t.id === id);
    if (next) {
      const num = id.replace('T', '');
      window.parent.postMessage({ type: 'CLUX_TASK_CHANGE', taskId: 'Task' + num, taskLabel: 'Task ' + num }, '*');
      setActive(next);
    }
  };

  const startProject = (projectInfo, existingState) => {
    if (existingState) {
      setState(existingState);
    } else {
      setState((s) => ({ ...s, projectStarted: true, project: projectInfo }));
    }
    window.parent.postMessage({ type: 'CLUX_TASK_CHANGE', taskId: 'Task1', taskLabel: 'Task 1' }, '*');
    setActive(TAB_DEFS[0]);
  };

  // Show intro screen until project is started
  if (!state.projectStarted) {
    const IntroScreen = window.IntroScreen;
    return IntroScreen ? <IntroScreen onStart={startProject} /> : null;
  }

  return (
    <div className="h-screen flex flex-col overflow-hidden" data-screen-label="Context-Linked UX Studio">
      {/* unified top bar */}
      <TopBar active={active} setActive={handleSetActive} conditions={conditions} setConditions={setConditions} />
      <div className="flex-1 flex overflow-hidden">
        <Sidebar state={state} activeTab={active.id} onShowSummary={() => setShowSummary(true)} />
        <main className="flex-1 overflow-hidden surface" data-screen-label={`${active.id} ${active.label}`}>
          {Comp ? <Comp condition={conditions[active.id]} state={state} setState={setState} goToTab={goToTab} content={cluxContent} /> : null}
        </main>
      </div>
      
      {/* Summary overlay */}
      {showSummary && window.SummaryView && (
        <window.SummaryView state={state} onClose={() => setShowSummary(false)} />
      )}
    </div>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

<body>
<div id="root"></div>
<script>
  // AI fallback — when running outside Claude.ai (downloaded standalone / external host),
  // window.claude is not injected. Provide canned but realistic responses so demos still work.
  (function setupAIFallback() {
    const hasClaude = typeof window.claude !== 'undefined' && typeof window.claude.complete === 'function';

    // Canned responses keyed by prompt intent — vary based on detected keywords / selected code IDs
    const ALL_CODES = {
      'C-014': '"손님이 많아지면 도장 찍어드리는 걸 깜빡해요"',
      'C-021': '"단골인지 한 번에 알아보기가 어려워요"',
      'C-027': '"종이 쿠폰을 분실해서 그냥 안 오시는 분도 있어요"',
      'C-031': '"매번 전화번호 묻기가 좀 미안하더라구요"',
      'C-038': '"바쁜 시간엔 누가 단골인지 신경 쓸 겨를이 없죠"',
      'C-044': '"앱 설치하라고 하면 손님들이 부담스러워해요"',
      'C-052': '"적립을 잊은 손님이 다음에 와서 항의하시기도 해요"',
      'C-058': '"얼굴은 알겠는데 이름·취향은 못 외워요"',
      'C-063': '"개인정보 어디로 가는지 손님이 물어볼 때 답하기 어려워요"',
      'C-071': '"단골님께만 살짝 음료 업그레이드 해드리고 싶어요"',
      'C-079': '"쿠폰 다 채워도 다음 방문이 늦으면 의미가 없죠"',
      'C-088': '"카메라로 자동 인식되면 편할 것 같긴 한데요…"',
    };
    const CLUSTER_OF = {
      'C-014': 'stamp-loss', 'C-027': 'stamp-loss', 'C-052': 'stamp-loss', 'C-079': 'stamp-loss',
      'C-021': 'identify',   'C-038': 'identify',   'C-058': 'identify',   'C-071': 'identify', 'C-088': 'identify',
      'C-031': 'privacy',    'C-044': 'privacy',    'C-063': 'privacy',
    };

    function mockT1Clusters(prompt) {
      // Pull which codes the user actually selected from prompt
      const selected = (prompt.match(/C-\d{3}/g) || []);
      const uniq = Array.from(new Set(selected));
      const groups = { 'stamp-loss': [], identify: [], privacy: [] };
      uniq.forEach(id => { const c = CLUSTER_OF[id]; if (c) groups[c].push(id); });
      const clusterDefs = [
        { key: 'stamp-loss', label: '도장 유실 패턴', summary: '바쁜 시간에 적립이 누락되고 쿠폰을 잃어버려요' },
        { key: 'identify',   label: '단골 식별 어려움', summary: '얼굴은 알지만 이름·취향까지 외우긴 어려워요' },
        { key: 'privacy',    label: '개인정보 부담',   summary: '전화번호·앱 설치 요구가 손님에게 부담돼요' },
      ];
      const clusters = clusterDefs
        .filter(c => uniq.length === 0 || groups[c.key].length > 0)
        .map(c => ({
          label: c.label,
          summary: c.summary,
          codeIds: uniq.length > 0 ? groups[c.key] : { 'stamp-loss': ['C-014','C-027','C-052','C-079'], identify: ['C-021','C-038','C-058','C-071','C-088'], privacy: ['C-031','C-044','C-063'] }[c.key],
          confidence: 78 + Math.floor(Math.random() * 14),
        }));
      return { headline: `${clusters.length}개 단서 묶음을 찾았어요`, clusters };
    }

    function mockT2Feedback(prompt) {
      const isDevilsAdvocate = /Devil's Advocate|비판적/.test(prompt);
      // Detect which cluster the user's problem touches
      const m = prompt.match(/\[사용자의 현재 문제 정의\]\s*([\s\S]*?)\n\n/);
      const problem = (m && m[1] || '').trim();
      const touches = {
        identify: /단골|알아|식별|기억|얼굴/.test(problem),
        privacy:  /개인정보|전화번호|익명|노출|동의/.test(problem),
        stamp:    /도장|쿠폰|적립|찍/.test(problem),
      };
      if (isDevilsAdvocate) {
        // Surface what the problem statement is missing
        const missing = [];
        const evidence = [];
        if (!touches.privacy) {
          missing.push('개인정보 부담');
          evidence.push({ codeId: 'C-031', quote: ALL_CODES['C-031'], reason: '개인정보 거부감 — 식별만으로 해결 안 됨' });
          evidence.push({ codeId: 'C-044', quote: ALL_CODES['C-044'], reason: '손님 행동 요구를 최소화해야 함' });
        }
        if (!touches.stamp) {
          missing.push('적립 누락');
          evidence.push({ codeId: 'C-052', quote: ALL_CODES['C-052'], reason: '식별 후 적립 흐름까지 함께 다뤄야 함' });
        }
        if (!touches.identify) {
          missing.push('식별 어려움');
          evidence.push({ codeId: 'C-058', quote: ALL_CODES['C-058'], reason: '단골 인지 자체의 어려움' });
        }
        if (missing.length === 0) {
          missing.push('실패·폴백 흐름');
          evidence.push({ codeId: 'C-079', quote: ALL_CODES['C-079'], reason: '주기가 길어졌을 때의 대응' });
        }
        return {
          feedback: `현재 정의는 ${missing.join('·')} 맥락이 약합니다. 이 부분이 빠지면 인터뷰에서 가장 자주 나온 손님 마찰이 그대로 남아요.`,
          alternativeProblem: `손님이 아무 행동도 하지 않아도 사장님이 자연스럽게 ${missing[0]}까지 해결할 수 있는 흐름이 필요해요.`,
          evidence: evidence.slice(0, 3),
        };
      }
      // Conclusion mode — tailor to the strongest touched cluster
      const focused = touches.privacy ? '개인정보 부담 없는 식별' : touches.stamp ? '도장 행위 자체의 제거' : '카운터에서의 빠른 식별';
      return {
        feedback: `현재 정의는 ${focused} 관점이 명료합니다. 행동을 더 구체적인 동사로 좁히면 솔루션 탐색이 쉬워져요.`,
        alternativeProblem: `카운터에서 사장님이 0.5초 안에 ${focused.includes('식별') ? '단골을 식별하고' : '적립을 트리거하고'} 자동으로 처리되는 방식이 필요해요.`,
        evidence: [],
      };
    }

    function mockT3Directions(prompt) {
      const isExpansive = /확장형|여러 방향성을 펼/.test(prompt) || /directions/.test(prompt);
      const isConvergent = /수렴|좁혀|추천드릴게요|solutions/.test(prompt);
      // Detect intent keywords
      const intentMatch = prompt.match(/\[디자이너의 컨셉 의도\]\s*([\s\S]*?)\n\n/);
      const intent = ((intentMatch && intentMatch[1]) || '').trim();
      const flags = {
        camera:   /카메라|얼굴|영상|CV/.test(intent),
        payment:  /결제|카드|토큰/.test(intent),
        privacy:  /익명|개인정보|동의/.test(intent),
        pattern:  /패턴|예측|빈도|주기/.test(intent),
        memory:   /기억|메모|일화|취향/.test(intent),
        physical: /NFC|키링|물리|사물/.test(intent),
        passive:  /자동|신경.*안|동선|자연스/.test(intent),
      };
      if (isConvergent && !isExpansive) {
        const solutions = [];
        if (flags.payment || flags.privacy || flags.passive) {
          solutions.push({
            title: '결제 토큰 기반 사일런트 적립',
            keywords: ['결제', '익명', '자동화'],
            rationale: [
              '손님 행동 0 — 결제 순간 자동 적립',
              'C-044 진입 마찰·C-031 개인정보 거부감 해소',
              'POS 연동만으로 도입 가능 (난이도 낮음)',
            ],
            evidence: ['C-031', 'C-044', 'C-052'],
            confidence: 90, mockupKind: 'R1',
          });
        }
        if (flags.camera || (!flags.payment && !flags.privacy)) {
          solutions.push({
            title: flags.camera ? '얼굴 인식 기반 자동 식별' : '결제 패턴 기반 단골 자동 식별',
            keywords: flags.camera ? ['카메라', 'CV', '비접촉'] : ['결제', '패턴', '자동화'],
            rationale: [
              '단골 식별 어려움 (41건) 직접 해결',
              flags.camera ? '영상은 로컬에서만 처리, 외부 전송 없음' : '결제 데이터만 사용해 손님 행동 요구 0',
              '카운터 인지 자원 ↓',
            ],
            evidence: flags.camera ? ['C-058', 'C-088', 'C-021'] : ['C-058', 'C-021', 'C-044'],
            confidence: 88, mockupKind: 'R1',
          });
        }
        if (flags.pattern) {
          solutions.push({
            title: '방문 빈도 기반 사장님 알림',
            keywords: ['예측', '관계', '리텐션'],
            rationale: [
              '도장 유실 38건 + 재방문 주기 누락 보완',
              'C-079 (주기 인지 부재) 직접 대응',
              '단골 음료 패턴까지 학습해 점진적 가치',
            ],
            evidence: ['C-079', 'C-071', 'C-038'],
            confidence: 84, mockupKind: 'R2',
          });
        }
        if (solutions.length === 0) {
          solutions.push({
            title: '결제 패턴 기반 단골 자동 식별',
            keywords: ['결제', 'CV', '자동화'],
            rationale: ['단골 식별 어려움 직접 해결', 'POS 연동만으로 도입 가능', '손님 행동 요구 0'],
            evidence: ['C-058', 'C-088', 'C-021', 'C-044'], confidence: 88, mockupKind: 'R1',
          });
        }
        return { intro: '가장 적합한 솔루션을 추천드릴게요.', solutions: solutions.slice(0, 2) };
      }
      // expansive — pick 5~6 directions biased by intent flags
      const pool = [
        { keyword: '데이터 기반 식별', desc: '결제·방문 패턴으로 자동 식별', evidence: ['C-058','C-088'], bias: flags.payment || flags.pattern || flags.passive },
        { keyword: '얼굴 인식 식별',   desc: '카메라로 단골을 비접촉 인식',   evidence: ['C-088','C-021'], bias: flags.camera },
        { keyword: '감성 기반 기억',   desc: '사장님의 메모와 일화로 기록',    evidence: ['C-071','C-038'], bias: flags.memory },
        { keyword: '예측 알림',        desc: '방문 주기를 학습해 이탈 신호',  evidence: ['C-079','C-071'], bias: flags.pattern },
        { keyword: '익명 적립',        desc: '카드 토큰만으로 무명 적립',     evidence: ['C-031','C-044'], bias: flags.privacy || flags.payment },
        { keyword: '물리 토큰',        desc: 'NFC 키링으로 도장 대체',         evidence: ['C-027','C-044'], bias: flags.physical },
        { keyword: '자동 알림',        desc: '단골 방문 시 사장님께 푸시',     evidence: ['C-021','C-038'], bias: flags.passive },
        { keyword: '취향 노트',        desc: '음료 패턴을 단골 카드에 묶음',  evidence: ['C-071'],          bias: flags.memory },
        { keyword: '커뮤니티 연결',    desc: '단골 간 추천·연결',             evidence: ['C-071'],          bias: false },
      ];
      const biased = pool.filter(p => p.bias);
      const rest = pool.filter(p => !p.bias);
      const directions = [...biased, ...rest].slice(0, 6).map(({ bias, ...d }) => d);
      return { intro: '여러 방향으로 펼쳐드릴게요.', directions };
    }

    // Legacy code path kept for non-keyword prompts; kept identical structure to original
    function _mockT3LegacyConvergent() {
      const isConvergent = false, isExpansive = false;
      if (isConvergent && !isExpansive) {
        return {
          intro: '가장 적합한 솔루션을 추천드릴게요.',
          solutions: [
            {
              title: '결제 패턴 기반 단골 자동 식별',
              keywords: ['결제', 'CV', '자동화'],
              rationale: [
                'T1 인사이트 — 단골 식별 난항 (41건) 직접 해결',
                '구현 난이도 낮음 · POS 연동만으로 도입 가능',
                '손님 행동 요구 0 — 진입 마찰 해소',
              ],
              evidence: ['C-058', 'C-088', 'C-021', 'C-044'],
              confidence: 92,
              mockupKind: 'R1',
            },
            {
              title: '방문 빈도 기반 사장님 알림',
              keywords: ['예측', '관계', '리텐션'],
              rationale: [
                'T1 — 도장 유실 38건 + 재방문 주기 누락 보완',
                'C-079 (방문 주기 인지 부재) 직접 대응',
                '단골 음료 패턴까지 학습해 점진적 가치 확장',
              ],
              evidence: ['C-079', 'C-071', 'C-038'],
              confidence: 84,
              mockupKind: 'R2',
            },
          ],
        };
      }
      return {
        intro: '여러 방향성을 펼쳐드릴게요.',
        directions: [
          { keyword: '데이터 기반 식별',    desc: '결제·방문 패턴으로 자동 식별',  evidence: ['C-058', 'C-088'] },
          { keyword: '감성 기반 기억',      desc: '사장님의 메모와 일화로 기록',   evidence: ['C-071', 'C-038'] },
          { keyword: '게임화된 단골 관계',  desc: '방문 누적에 따른 시각적 보상',  evidence: ['C-079', 'C-027'] },
          { keyword: '자동 알림 시스템',    desc: '단골 방문 시 사장님께 푸시',     evidence: ['C-021', 'C-038'] },
          { keyword: '커뮤니티 연결',       desc: '단골 간 추천·연결 기능',        evidence: ['C-071'] },
          { keyword: '익명 적립',           desc: '카드 토큰만으로 무명 적립',     evidence: ['C-031', 'C-044'] },
          { keyword: '물리 토큰',           desc: 'NFC 키링으로 도장 대체',         evidence: ['C-027', 'C-044'] },
        ],
      };
    }

    async function aiComplete(prompt) {
      if (hasClaude) {
        return await window.claude.complete(prompt);
      }
      // simulate network latency for realistic UX
      await new Promise(r => setTimeout(r, 1100 + Math.random() * 700));
      let result;
      if (/directions|solutions|확장형|수렴|방향성을 펼|솔루션을 추천/.test(prompt)) {
        result = mockT3Directions(prompt);
      } else if (/HMW|How Might We|alternativeHmw|alternativeProblem|Problem Statement|문제 정의/.test(prompt)) {
        result = mockT2Feedback(prompt);
      } else {
        result = mockT1Clusters(prompt);
      }
      return JSON.stringify(result);
    }

    window.aiComplete = aiComplete;
    window.__aiIsLive = hasClaude;
  })();
</script>









<script>
// postMessage for task changes is handled in the App component's handleSetActive and goToTab functions

// Click event tracking
document.addEventListener('click', function(e) {
  window.parent.postMessage({ type: 'CLUX_EVENT', eventType: 'click', x: e.clientX, y: e.clientY }, '*');
}, true);

// Mouse hesitation tracking (2s+ stillness)
(function() {
  var _hesiTimer = null;
  var _hesiX = 0, _hesiY = 0;
  document.addEventListener('mousemove', function(e) {
    clearTimeout(_hesiTimer);
    _hesiX = e.clientX;
    _hesiY = e.clientY;
    _hesiTimer = setTimeout(function() {
      window.parent.postMessage({ type: 'CLUX_EVENT', eventType: 'hesitation', x: _hesiX, y: _hesiY }, '*');
    }, 2000);
  }, false);
})();
</script>
